<!DOCTYPE html>
<meta charset="utf-8">

<!-- Bubble cursor based on Tovi Grossman & Ravin Balakrishnan's design -->
<!-- https://www.tovigrossman.com/BubbleCursor/ -->
<!-- JavaScript adapted from Maneesh Agrawala's implementation -->
<!-- http://bl.ocks.org/magrawala/9716298 -->

<head>
  <script type="text/javascript" src="https://d3js.org/d3.v3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/g/filesaver.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }
    #bubbleCursor {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="bubbleCursor"></div>
  <script src="app.js"></script>
</body>
</html>
